<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/">
      <span class="material-symbols-outlined">account_tree</span>
      <span class="brand-name">Weave</span>
    </a>
    <nav class="crumbs" id="crumbs"></nav>
    <div class="spacer"></div>
    <button class="btn btn-primary" id="new-project-btn">
      <span class="material-symbols-outlined">add</span> 새 프로젝트
    </button>
  </header>

  <main id="view"></main>

  <nav class="bottom-nav">
    <button class="bn-item" data-nav="folders"><span class="material-symbols-outlined">folder</span><span>FOLDERS</span></button>
    <button class="bn-item" data-nav="home"><span class="material-symbols-outlined">history</span><span>RECENT</span></button>
    <button class="bn-fab" id="bn-fab" title="추가"><span class="material-symbols-outlined">add</span></button>
    <button class="bn-item" data-nav="calendar"><span class="material-symbols-outlined">calendar_today</span><span>CALENDAR</span></button>
    <button class="bn-item" data-nav="profile"><span class="material-symbols-outlined">person</span><span>PROFILE</span></button>
  </nav>

  <div class="modal-overlay" id="modal-overlay" hidden>
    <div class="modal" id="modal"></div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script src="/app.js"></script>
</body>
</html>
